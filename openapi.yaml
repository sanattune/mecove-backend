openapi: 3.0.3
info:
  title: meCove API
  version: 0.1.0
  description: "REST API for the meCove mobile app. Base path: `/api/v1`."
servers:
  - url: /api/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token returned by `/auth/verify` or `/auth/refresh`. Expires in 1 hour.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Invalid request
    MessageItem:
      type: object
      properties:
        id:
          type: string
          example: clx1abc:user
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
        timestamp:
          type: string
          format: date-time
paths:
  /auth/request-otp:
    post:
      tags:
        - Auth
      summary: Request OTP
      description: Sends a 6-digit OTP via SMS. Rate limited to 3 requests per 15 minutes per phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  description: E.164 format
                  example: "+919876543210"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/verify:
    post:
      tags:
        - Auth
      summary: Verify OTP and sign in
      description: Verifies the OTP and returns a JWT access token and refresh token. Creates the user if this is their first
        sign-in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - otp
              properties:
                phoneNumber:
                  type: string
                  example: "+919876543210"
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
                  refreshToken:
                    type: string
                    description: JWT, expires in 30 days
                  userId:
                    type: string
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
        "401":
          description: Invalid, expired, or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and revoke refresh token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /messages:
    get:
      tags:
        - Messages
      summary: Get message history
      description: Returns paginated chat history (user + assistant messages) across all channels, newest first. Excludes
        command replies and test feedback.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: before
          schema:
            type: string
            format: date-time
          description: Cursor — return messages older than this ISO timestamp
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageItem"
                  hasMore:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /messages/send:
    post:
      tags:
        - Messages
      summary: Send a message and get AI reply
      description: Stores the user message, runs the AI reply pipeline synchronously, and returns both messages. Times out
        after 30 seconds. Rate limited to 20 requests per minute.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 10000
      responses:
        "200":
          description: Message sent and reply generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    $ref: "#/components/schemas/MessageItem"
                  assistantMessage:
                    $ref: "#/components/schemas/MessageItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: AI reply timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
tags: []
