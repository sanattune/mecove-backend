                  startDate:
                    type: string
                    format: date-time
                    nullable: true
                  endDate:
                    type: string
                    format: date-time
                    nullable: true
                  autoSendSessionBridge:
                    type: boolean
                  acceptedAt:
                    type: string
                    format: date-time
                    nullable: true
                  endedAt:
                    type: string
                    format: date-time
                    nullable: true
                  endedBy:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
                  inviteePhone:
                    type: string
                    nullable: true
                  professional:
                    type: object
                    properties:
                      professionalId:
                        type: string
                      displayName:
                        type: string
                      professionalType:
                        type: string
                      additionalTitle:
                        type: string
