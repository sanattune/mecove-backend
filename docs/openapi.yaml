openapi: 3.0.3
info:
  title: meCove API
  version: 1.0.0
  description: meCove mobile app REST API
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /health:
    get: &a1
      responses:
        "200":
          description: Default Response
    head: *a1
  /auth/request-otp:
    post:
      summary: Request OTP
      tags:
        - Auth
      description: Sends a 6-digit OTP via SMS. Rate limited to 3 requests per 15
        minutes per phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  description: E.164 format
                  example: "+919876543210"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/verify:
    post:
      summary: Verify OTP and sign in
      tags:
        - Auth
      description: Verifies the OTP and returns a JWT access token and refresh token.
        Creates the user if this is their first sign-in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - otp
              properties:
                phoneNumber:
                  type: string
                  example: "+919876543210"
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
                  refreshToken:
                    type: string
                    description: JWT, expires in 30 days
                  userId:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /messages:
    get:
      summary: Get message history
      tags:
        - Messages
      description: Returns paginated chat history (user + assistant messages) across
        all channels, newest first.
      parameters:
        - schema:
            type: string
            format: date-time
          in: query
          name: before
          required: false
          description: Cursor — return messages older than this ISO timestamp
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          in: query
          name: limit
          required: false
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        role:
                          type: string
                          enum:
                            - user
                            - assistant
                        content:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /messages/send:
    post:
      summary: Send a message and get AI reply
      tags:
        - Messages
      description: Stores the user message, runs the AI reply pipeline synchronously,
        and returns both messages. Times out after 30 seconds. Rate limited to
        20 requests per minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 10000
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                  assistantMessage:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /summary/generate:
    post:
      summary: Request a report
      tags:
        - Summary
      description: Enqueues a report generation job. Returns a summaryId to poll. Only
        one report per user can be in progress at a time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - range
              properties:
                type:
                  type: string
                  enum:
                    - sessionbridge
                    - myself_lately
                range:
                  type: string
                  enum:
                    - last_7_days
                    - last_15_days
                    - last_30_days
      security:
        - BearerAuth: []
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  summaryId:
                    type: string
                  status:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /summary/{summaryId}:
    get:
      summary: Get report status
      tags:
        - Summary
      description: Poll this after POST /summary/generate. Status progresses queued →
        processing → success | success_fallback | failed.
      parameters:
        - schema:
            type: string
          in: path
          name: summaryId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - queued
                      - processing
                      - success
                      - success_fallback
                      - failed
                  reportType:
                    type: string
                  rangeStart:
                    type: string
                    format: date-time
                  rangeEnd:
                    type: string
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /summary/{summaryId}/pdf:
    get:
      summary: Download report PDF
      tags:
        - Summary
      description: Returns the PDF bytes for a completed report. Only available once
        status is success or success_fallback.
      parameters:
        - schema:
            type: string
          in: path
          name: summaryId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: PDF file
          content:
            application/json:
              schema:
                type: string
                format: binary
                description: PDF file
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /checkin:
    get:
      summary: Get current check-in reminder
      tags:
        - Checkin
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  time:
                    type: string
                    enum:
                      - 06:00
                      - 16:00
                      - 21:00
                    nullable: true
                  label:
                    type: string
                    nullable: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /checkin/setup:
    post:
      summary: Set or turn off daily check-in reminder
      tags:
        - Checkin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - time
              properties:
                time:
                  type: string
                  enum:
                    - 06:00
                    - 16:00
                    - 21:00
                    - off
                  description: Time slot in HH:MM (Asia/Kolkata) or "off" to disable
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  time:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /stats:
    get:
      summary: Get user stats
      tags:
        - Account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageCount:
                    type: integer
                  memberSince:
                    type: string
                    format: date-time
                    nullable: true
                  lastReport:
                    nullable: true
                    type: object
                    properties:
                      type:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /account/data:
    delete:
      summary: Delete all user data
      tags:
        - Account
      description: Permanently deletes all messages and reports for the authenticated
        user. Cannot be undone.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /privacy:
    get:
      summary: Get privacy notice
      tags:
        - Account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  link:
                    type: string
                    nullable: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /webhooks/whatsapp:
    get:
      responses:
        "200":
          description: Default Response
    post:
      responses:
        "200":
          description: Default Response
  /debug/consent-status:
    get:
      responses:
        "200":
          description: Default Response
  /debug/enqueue-summary:
    get: &a2
      responses:
        "200":
          description: Default Response
    post: *a2
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: OTP sign-in, token refresh, logout
  - name: Messages
    description: Chat messages and AI replies
  - name: Summary
    description: Report generation and PDF download
  - name: Checkin
    description: Daily reminder configuration
  - name: Account
    description: User stats, data deletion, privacy
