openapi: 3.0.3
info:
  title: meCove API
  version: 1.0.0
  description: meCove mobile app REST API
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /health:
    get: &a1
      responses:
        "200":
          description: Default Response
    head: *a1
  /auth/request-otp:
    post:
      summary: Request OTP
      tags:
        - Auth
      description: Sends a 6-digit OTP via SMS. Rate limited to 3 requests per 15
        minutes per phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  description: E.164 format
                  example: "+919876543210"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/verify:
    post:
      summary: Verify OTP and sign in
      tags:
        - Auth
      description: Verifies the OTP and returns a JWT access token and refresh token.
        Creates the user if this is their first sign-in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - otp
              properties:
                phoneNumber:
                  type: string
                  example: "+919876543210"
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
                  refreshToken:
                    type: string
                    description: JWT, expires in 30 days
                  userId:
                    type: string
                  privacyAccepted:
                    type: boolean
                    description: Whether the user has accepted the privacy notice
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT, expires in 1 hour
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /messages:
    get:
      summary: Get message history
      tags:
        - Messages
      description: Returns paginated chat history (user + assistant messages) across
        all channels, newest first.
      parameters:
        - schema:
            type: string
            format: date-time
          in: query
          name: before
          required: false
          description: Cursor — return messages older than this ISO timestamp
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          in: query
          name: limit
          required: false
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        role:
                          type: string
                          enum:
                            - user
                            - assistant
                        content:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                  hasMore:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /messages/send:
    post:
      summary: Send a message and get AI reply
      tags:
        - Messages
      description: Stores the user message, runs the AI reply pipeline synchronously,
        and returns both messages. Times out after 30 seconds. Rate limited to
        20 requests per minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 10000
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                  assistantMessage:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /insights/generate:
    post:
      summary: Request an insight
      tags:
        - Insights
      description: Enqueues an insight generation job. Returns an insightId to poll.
        Only one insight per user can be in progress at a time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - range
              properties:
                type:
                  type: string
                  enum:
                    - sessionbridge
                    - myself_lately
                range:
                  type: string
                  enum:
                    - last_7_days
                    - last_15_days
                    - last_30_days
      security:
        - BearerAuth: []
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  insightId:
                    type: string
                  status:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /insights/{insightId}:
    get:
      summary: Get insight status
      tags:
        - Insights
      description: Poll this after POST /insights/generate. Status progresses queued →
        processing → success | success_fallback | failed.
      parameters:
        - schema:
            type: string
          in: path
          name: insightId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - queued
                      - processing
                      - success
                      - success_fallback
                      - failed
                  insightType:
                    type: string
                  rangeStart:
                    type: string
                    format: date-time
                  rangeEnd:
                    type: string
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /insights/{insightId}/pdf:
    get:
      summary: Download insight PDF
      tags:
        - Insights
      description: Returns the PDF bytes for a completed insight. Only available once
        status is success or success_fallback.
      parameters:
        - schema:
            type: string
          in: path
          name: insightId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: PDF file
          content:
            application/json:
              schema:
                type: string
                format: binary
                description: PDF file
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /checkin:
    get:
      summary: Get current check-in reminder
      tags:
        - Checkin
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  time:
                    type: string
                    enum:
                      - 06:00
                      - 16:00
                      - 21:00
                    nullable: true
                  label:
                    type: string
                    nullable: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /checkin/setup:
    post:
      summary: Set or turn off daily check-in reminder
      tags:
        - Checkin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - time
              properties:
                time:
                  type: string
                  enum:
                    - 06:00
                    - 16:00
                    - 21:00
                    - off
                  description: Time slot in HH:MM (Asia/Kolkata) or "off" to disable
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  time:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /stats:
    get:
      summary: Get user stats
      tags:
        - Account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageCount:
                    type: integer
                  memberSince:
                    type: string
                    format: date-time
                    nullable: true
                  lastInsight:
                    nullable: true
                    type: object
                    properties:
                      type:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /account/data:
    delete:
      summary: Delete all user data
      tags:
        - Account
      description: Permanently deletes all messages and reports for the authenticated
        user. Cannot be undone.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /privacy:
    get:
      summary: Get privacy notice
      tags:
        - Account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  link:
                    type: string
                    nullable: true
                  privacyAccepted:
                    type: boolean
                    description: True if user accepted the current policy version
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /privacy/accept:
    post:
      summary: Accept privacy notice
      tags:
        - Account
      description: Records the user's consent. Sets privacyAcceptedAt and
        privacyAcceptedVersion on the user record. Safe to call multiple times.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /professional/profiles:
    post:
      summary: Create a professional profile
      tags:
        - Professional
      description: Self-serve onboarding. Creates a ProfessionalProfile for the caller
        and marks them a professional. A user may hold several profiles (e.g.
        therapist and coach). Active immediately; verificationStatus starts
        'pending'.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - professionalType
                - displayName
              properties:
                professionalType:
                  type: string
                  enum:
                    - therapist
                    - counsellor
                    - coach
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 120
                additionalTitle:
                  type: string
                  maxLength: 120
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  professionalType:
                    type: string
                    enum:
                      - therapist
                      - counsellor
                      - coach
                  displayName:
                    type: string
                  additionalTitle:
                    type: string
                    nullable: true
                  verificationStatus:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
    get:
      summary: List the caller's professional profiles
      tags:
        - Professional
      description: Returns the authenticated user's own professional profiles (empty
        array if none).
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        professionalType:
                          type: string
                          enum:
                            - therapist
                            - counsellor
                            - coach
                        displayName:
                          type: string
                        additionalTitle:
                          type: string
                          nullable: true
                        verificationStatus:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /professional/engagements:
    post:
      summary: Open an engagement with a client
      tags:
        - Professional
      description: "Pro-initiated. Identifies the client by E.164 phone: if an account
        exists it is linked (add); otherwise a pending invite is stored keyed by
        phone (invite), reconciled when that phone signs up. Always starts
        'pending' — the client must accept. Rejects a duplicate pending/active
        engagement for the same pro↔client pair."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - professionalId
                - clientPhone
              properties:
                professionalId:
                  type: string
                  description: One of the caller's professional profiles
                clientPhone:
                  type: string
                  description: E.164, e.g. +919876543210
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  professionalId:
                    type: string
                  status:
                    type: string
                    enum:
                      - pending
                      - active
                      - ended
                  startDate:
                    type: string
                    format: date-time
                    nullable: true
                  endDate:
                    type: string
                    format: date-time
                    nullable: true
                  autoSendSessionBridge:
                    type: boolean
                  acceptedAt:
                    type: string
                    format: date-time
                    nullable: true
                  endedAt:
                    type: string
                    format: date-time
                    nullable: true
                  endedBy:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
                  client:
                    type: object
                    nullable: true
                    properties:
                      userId:
                        type: string
                      phone:
                        type: string
                        nullable: true
                      displayName:
                        type: string
                        nullable: true
                  inviteePhone:
                    type: string
                    nullable: true
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
    get:
      summary: List the caller's engagements
      tags:
        - Professional
      description: All engagements across the caller's professional profiles, newest
        first. Linked client profile (phone, name) is included once an account
        is attached.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  engagements:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        professionalId:
                          type: string
                        status:
                          type: string
                          enum:
                            - pending
                            - active
                            - ended
                        startDate:
                          type: string
                          format: date-time
                          nullable: true
                        endDate:
                          type: string
                          format: date-time
                          nullable: true
                        autoSendSessionBridge:
                          type: boolean
                        acceptedAt:
                          type: string
                          format: date-time
                          nullable: true
                        endedAt:
                          type: string
                          format: date-time
                          nullable: true
                        endedBy:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        client:
                          type: object
                          nullable: true
                          properties:
                            userId:
                              type: string
                            phone:
                              type: string
                              nullable: true
                            displayName:
                              type: string
                              nullable: true
                        inviteePhone:
                          type: string
                          nullable: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /engagements:
    get:
      summary: List my engagements (as a client)
      tags:
        - Engagement
      description: The caller's engagements with professionals — pending (to accept),
        active, and ended — newest first, each with the professional's profile.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  engagements:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        professionalId:
                          type: string
                        status:
                          type: string
                          enum:
                            - pending
                            - active
                            - ended
                        startDate:
                          type: string
                          format: date-time
                          nullable: true
                        endDate:
                          type: string
                          format: date-time
                          nullable: true
                        autoSendSessionBridge:
                          type: boolean
                        acceptedAt:
                          type: string
                          format: date-time
                          nullable: true
                        endedAt:
                          type: string
                          format: date-time
                          nullable: true
                        endedBy:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        inviteePhone:
                          type: string
                          nullable: true
                        professional:
                          type: object
                          properties:
                            professionalId:
                              type: string
                            displayName:
                              type: string
                            professionalType:
                              type: string
                            additionalTitle:
                              type: string
                              nullable: true
                            verificationStatus:
                              type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /engagements/{engagementId}/accept:
    post:
      summary: Accept a pending engagement
      tags:
        - Engagement
      description: The client's consent gate (D5). Moves a pending engagement to
        active. No client data flows to the professional until this is done. 409
        if the engagement is not pending or an active one with that professional
        already exists.
      parameters:
        - schema:
            type: string
          in: path
          name: engagementId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
