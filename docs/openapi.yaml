  /professional/engagements/{engagementId}/insights:
    get:
      summary: List insights shared on an engagement
      tags:
        - Professional
      description: Insights the client has shared and not revoked, only while the
        engagement is active (access is derived — ending the engagement cuts
        access). Metadata only.
      parameters:
        - schema:
            type: string
          in: path
          name: engagementId
          required: true
      security:
        - BearerAuth: []
      responses:
