  /engagements/{engagementId}/shares:
    post:
      summary: Share an insight with this engagement
      tags:
        - Engagement
      description: Client discloses one of their own insights (any type) to an active
        engagement. The professional can then read it; no raw journal, no pull.
        Re-sharing a previously-unshared insight reactivates it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - insightId
              properties:
                insightId:
                  type: string
      parameters:
        - schema:
            type: string
          in: path
          name: engagementId
          required: true
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  engagementId:
                    type: string
                  insightId:
                    type: string
                  sharedAt:
                    type: string
                    format: date-time
                  revokedAt:
                    type: string
                    format: date-time
                    nullable: true
                  autoSent:
                    type: boolean
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
