                properties:
                  error:
                    type: string
                  message:
                    type: string
  /engagements/{engagementId}/shares/{insightId}:
    delete:
      summary: Unshare an insight
      tags:
        - Engagement
      description: Client revokes a single shared insight (sets revokedAt); the
        engagement and other shares are untouched. Idempotent.
      parameters:
        - schema:
            type: string
          in: path
          name: engagementId
          required: true
        - schema:
            type: string
          in: path
          name: insightId
          required: true
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
