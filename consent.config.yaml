welcome:
  version: "v1"
  message: |-
    Welcome to meCove.

    Send messages anytime—I'll help organize them and generate summaries.

    Tap OK to review the privacy/usage notice and get started.
  buttons:
    ok: "OK"

mvp:
  version: "v2"
  message: |-
    By participating in the SessionBridge MVP, you acknowledge that:

    * This is a test-phase product that may malfunction or be discontinued.
    * Data loss may occur.
    * Data is encrypted at rest; operators may access decrypted content when necessary for the service.
    * The Service is not therapy, medical care, counseling, coaching, or crisis support.
    * The Service does not monitor for emergencies.
    * Messages may be processed by third-party AI providers.
    * Limited internal technical access may occur for debugging.
    * No uptime guarantees or service level commitments are provided.
    * You are responsible for the content you submit and how you use exported summaries.

    If you do not agree with these conditions, you should not use the Service.
  link: "https://mecove.framer.website/privacy"
  buttons:
    accept: "Accept"
    later: "Later"

templates:
  blocked: "Before we proceed, please take a moment to read this privacy/usage notice."
  later: "No problem. You can accept now or come back later."
  completed: "I'm ready to listen and record your thoughts - let's go."
